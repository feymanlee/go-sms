name: ci
on:
  push:
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        go: ["1.25.x", "1.26.x"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go test ./...
      - if: matrix.go == '1.26.x'
        run: go test -race ./...
